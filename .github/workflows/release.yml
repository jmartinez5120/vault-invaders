name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Build release zip
        run: |
          NAME="vault-invaders-${{ steps.version.outputs.version }}"
          mkdir -p dist/$NAME
          cp vault_invaders.py install.sh LICENSE README.md VERSION vault_invaders.icns dist/$NAME/
          cd dist
          zip -r "$NAME.zip" "$NAME"
          sha256sum "$NAME.zip" > "$NAME.zip.sha256"
          rm -rf "$NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: |
            dist/vault-invaders-${{ steps.version.outputs.version }}.zip
            dist/vault-invaders-${{ steps.version.outputs.version }}.zip.sha256
